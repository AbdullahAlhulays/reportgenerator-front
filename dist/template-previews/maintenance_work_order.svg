<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1200" viewBox="0 0 900 1200" role="img" aria-labelledby="title desc">
  <title id="title">Maintenance Work Order preview</title>
  <desc id="desc">Document preview for the maintenance work order template.</desc>
  <rect width="900" height="1200" fill="#edf3f8"/>
  <rect x="84" y="48" width="732" height="1104" rx="14" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="84" y="48" width="732" height="136" rx="14" fill="#164e63"/>
  <rect x="122" y="86" width="86" height="58" rx="10" fill="#cffafe"/>
  <text x="232" y="108" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#fff">MAINTENANCE WORK ORDER</text>
  <text x="232" y="142" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="600" fill="#cffafe">asset, priority, work performed, and recommendations</text>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="120" y="222" width="660" height="70" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="144" y="252" font-size="14" font-weight="800" fill="#64748b">REPORT NO.</text>
    <text x="144" y="276" font-size="17" fill="#0f172a">{{ report_no }}</text>
    <line x1="382" y1="232" x2="382" y2="282" stroke="#cbd5e1"/>
    <text x="412" y="252" font-size="14" font-weight="800" fill="#64748b">DATE / TIME</text>
    <text x="412" y="276" font-size="17" fill="#0f172a">{{ report_date }} / {{ report_time }}</text>

    <rect x="120" y="330" width="660" height="38" rx="8" fill="#ecfeff"/>
    <text x="144" y="355" font-size="18" font-weight="800" fill="#155e75">1. REQUEST DETAILS</text>
    <text x="144" y="406" font-size="15" font-weight="800" fill="#334155">Building Location</text>
    <text x="390" y="406" font-size="15" fill="#334155">{{ building_location }}</text>
    <text x="144" y="450" font-size="15" font-weight="800" fill="#334155">Area / Room</text>
    <text x="390" y="450" font-size="15" fill="#334155">{{ area_room }}</text>
    <text x="144" y="494" font-size="15" font-weight="800" fill="#334155">Requested By</text>
    <text x="390" y="494" font-size="15" fill="#334155">{{ requested_by }}</text>
    <text x="144" y="538" font-size="15" font-weight="800" fill="#334155">Technician</text>
    <text x="390" y="538" font-size="15" fill="#334155">{{ technician_name }}</text>
    <text x="144" y="582" font-size="15" font-weight="800" fill="#334155">Asset / Equipment</text>
    <text x="390" y="582" font-size="15" fill="#334155">{{ asset_equipment }}</text>

    <rect x="120" y="634" width="660" height="38" rx="8" fill="#eff6ff"/>
    <text x="144" y="659" font-size="18" font-weight="800" fill="#1d4ed8">2. PRIORITY AND STATUS</text>
    <text x="144" y="710" font-size="15" font-weight="800" fill="#334155">Priority</text>
    <text x="390" y="710" font-size="15" fill="#334155">{{ priority }}</text>
    <text x="144" y="754" font-size="15" font-weight="800" fill="#334155">Maintenance Type</text>
    <text x="390" y="754" font-size="15" fill="#334155">{{ maintenance_type }}</text>
    <text x="144" y="798" font-size="15" font-weight="800" fill="#334155">Current Status</text>
    <text x="390" y="798" font-size="15" fill="#334155">{{ current_status }}</text>

    <rect x="120" y="850" width="660" height="38" rx="8" fill="#fef3c7"/>
    <text x="144" y="875" font-size="18" font-weight="800" fill="#92400e">3. WORK SUMMARY</text>
    <text x="144" y="926" font-size="15" font-weight="800" fill="#334155">Issue Description</text>
    <text x="390" y="926" font-size="15" fill="#334155">{{ issue_description }}</text>
    <text x="144" y="970" font-size="15" font-weight="800" fill="#334155">Work Performed</text>
    <text x="390" y="970" font-size="15" fill="#334155">{{ work_performed }}</text>
    <text x="144" y="1014" font-size="15" font-weight="800" fill="#334155">Parts / Materials</text>
    <text x="390" y="1014" font-size="15" fill="#334155">{{ parts_materials }}</text>
    <text x="144" y="1058" font-size="15" font-weight="800" fill="#334155">Safety Notes</text>
    <text x="390" y="1058" font-size="15" fill="#334155">{{ safety_notes }}</text>
    <text x="144" y="1102" font-size="15" font-weight="800" fill="#334155">Recommendations</text>
    <text x="390" y="1102" font-size="15" fill="#334155">{{ recommendations }}</text>
  </g>
  <g stroke="#e2e8f0" stroke-width="2">
    <line x1="120" y1="426" x2="780" y2="426"/>
    <line x1="120" y1="470" x2="780" y2="470"/>
    <line x1="120" y1="514" x2="780" y2="514"/>
    <line x1="120" y1="558" x2="780" y2="558"/>
    <line x1="120" y1="730" x2="780" y2="730"/>
    <line x1="120" y1="774" x2="780" y2="774"/>
    <line x1="120" y1="946" x2="780" y2="946"/>
    <line x1="120" y1="990" x2="780" y2="990"/>
    <line x1="120" y1="1034" x2="780" y2="1034"/>
    <line x1="120" y1="1078" x2="780" y2="1078"/>
  </g>
</svg>
